<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {font-family: Arial, Helvetica, sans-serif;}

/* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* Set a style for all buttons */
button {
  background-color: #e4cac2;
  color: #491c0f;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
}

button:hover {
  opacity: 0.8;
}
.login-btn {
  padding: 10px 22px;
  background: #5a2e1f;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-family: "Inter", "Segoe UI", sans-serif;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  max-width: 150px;      /* ← keeps it from stretching */
  width: 100%;           /* ← centers nicely inside the table cell */
}

.login-btn:hover {
  background: #6c3a28;
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}

.login-btn:active {
  transform: translateY(0);
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}
/* Extra styles for the cancel button */
.cancelbtn {
  width: auto;
  padding: 10px 18px;
  background-color: #f44336;
}

/* Center the image and position the close button */
.imgcontainer {
  text-align: center;
  margin: 24px 0 12px 0;
  position: relative;
}

img.avatar {
  width: 40%;
  border-radius: 50%;
}

.container {
  padding: 16px;
}

span.psw {
  float: right;
  padding-top: 16px;
}

/* The Modal (background) */
.modal {
  display: none;
  position: fixed;
  z-index: 10;
  inset: 0; /* shorthand for top/left/right/bottom: 0 */
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(4px);
  padding-top: 60px;
}
.modal-header {
  position: relative;
  text-align: center;
  margin-bottom: 20px;
  border-bottom: 1px solid #eee;
  padding-bottom: 15px;
}
.modal-icon {
  font-size: 40px;
  margin-bottom: 8px;
}
.modal-title {
  font-family: "Inter", "Segoe UI", sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: #333;
  margin: 0;
  padding-top: 10px;
}
/* Modal Content/Box */
.modal-content {
  background: #ffffff;
  margin: 5% auto;
  padding: 30px 35px;
  border-radius: 14px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border: none; /* remove old border */
  font-family: "Inter", "Segoe UI", sans-serif;
}
.modal-content input[type="text"],
.modal-content input[type="password"] {
  width: 100%;
  padding: 12px;
  margin: 10px 0 18px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 15px;
}

.modal-content button {
  width: 100%;
  padding: 12px;
  background: #5a2e1f;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}

.modal-content button:hover {
  background: #6c3a28;
}

.cancelbtn {
  background: #ccc;
  color: #333;
}

.cancelbtn:hover {
  background: #bbb;
}

/* The Close Button (x) */
.close {
  float: right;
  font-size: 28px;
  font-weight: bold;
  color: #666;
  cursor: pointer;
  transition: color 0.2s;
}

.close:hover {
  color: #000;
}

/* Add Zoom Animation */
.animate {
  -webkit-animation: animatezoom 0.6s;
  animation: animatezoom 0.6s
}

@-webkit-keyframes animatezoom {
  from {-webkit-transform: scale(0)} 
  to {-webkit-transform: scale(1)}
}
  
@keyframes animatezoom {
  from {transform: scale(0)} 
  to {transform: scale(1)}
}

/* Change styles for span and cancel button on extra small screens */
@media screen and (max-width: 300px) {
  span.psw {
     display: block;
     float: none;
  }
  .cancelbtn {
     width: 100%;
  }
}
</style>
</head>
<body style="background-color: #491c0f;">
<p align="center"><img src=" {{ logon_image }} " alt=" Logon image"></p>
<table border="0" width="50%" align="center">
	<tr><td align="center"><p style="font-family:Arial, Helvetica, sans-serif; font-size: 30px; font-weight:bold; color: #e4cac2">Welcome to Almond Admin</p></td></tr>
	<tr><td align="center"><button class="login-btn" onclick="document.getElementById('id01').style.display='block'">Login</button></td></tr>
</table>
<div id="id01" class="modal">
  <form class="modal-content animate" action="/almond/admin" method="post">
	  <input type="hidden" name="action_type" value="create_session">
    <div class="imgcontainer">
      <span onclick="document.getElementById('id01').style.display='none'" class="close" title="Close Modal">&times;</span>
      <!--<img src="img_avatar2.png" alt="Avatar" class="avatar">-->
      <div class="modal-icon">🔒</div>
      <h2 class="modal-title">Almond Admin Login</h2>
    </div>

    <div class="container" style="background-color: #491c0f; color: #ffffff"">
      <label for="uname"><b>Username</b></label>
      <input type="text" placeholder="Enter Username" name="uname" required>

      <label for="psw"><b>Password</b></label>
      <input type="password" placeholder="Enter Password" name="psw" required>
        
      <button type="submit">Login</button>
      <label>
        <input type="checkbox" checked="checked" name="remember"> Remember me
      </label>
    </div>
    <div class="container" style="background-color:#f1f1f1">
      <button type="button" onclick="document.getElementById('id01').style.display='none'" class="cancelbtn">Cancel</button>
    </div>
  </form>
</div>

<script>
// Get the modal
var modal = document.getElementById('id01');

// When the user clicks anywhere outside of the modal, close it
window.onclick = function(event) {
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
